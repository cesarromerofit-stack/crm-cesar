<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicole Interiors</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #0b0b0b;
            color: white;
        }

        /* NAV */
        nav {
            position: fixed;
            width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            opacity: 0.7;
        }

        nav a:hover {
            opacity: 1;
        }

        /* HERO */
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            padding: 80px;
            background: url("https://images.unsplash.com/photo-1600607687939-ce8a6c25118c") center/cover fixed;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.3));
        }

        .hero-content {
            position: relative;
            max-width: 600px;
            animation: fadeUp 1.2s ease;
        }

        .hero h1 {
            font-size: 60px;
        }

        .btn {
            background: linear-gradient(45deg, gold, #ffcc00);
            padding: 14px 30px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* SECTION */
        .section {
            padding: 100px 60px;
            text-align: center;
        }

        /* BEFORE AFTER WOW */
        .compare {
            position: relative;
            max-width: 900px;
            margin: auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            transition: 0.5s;
        }

        .compare:hover {
            transform: scale(1.02);
        }

        .compare img {
            width: 100%;
            display: block;
        }

        .slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            overflow: hidden;
        }

        .handle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: gold;
            cursor: ew-resize;
            box-shadow: 0 0 10px gold;
        }

        /* TEXT LABELS */
        .label {
            position: absolute;
            top: 20px;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            font-size: 14px;
        }

        .before {
            left: 20px;
        }

        .after {
            right: 20px;
        }

        /* COUNTER */
        .counter {
            font-size: 60px;
            color: gold;
            margin-top: 40px;
        }

        /* ANIMATIONS */
        .fade {
            opacity: 0;
            transform: translateY(40px);
            transition: 1s;
        }

        .fade.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <nav>
        <h2>Nicole Interiors</h2>
        <div>
            <a href="#inicio">Inicio</a>
            <a href="#antes">Antes/Después</a>
        </div>
    </nav>

    <section id="inicio" class="hero">
        <div class="hero-content">
            <h1>Transform Your Space Into Luxury</h1>
            <p>Diseño moderno, elegante y funcional en Punta Cana</p>
            <button class="btn">Solicitar diseño</button>
        </div>
    </section>

    <section id="antes" class="section fade">
        <h2 style="font-size:40px;">Antes & Después</h2>
        <p style="opacity:0.7; margin-bottom:40px;">
            Desliza y descubre la transformación
        </p>

        <div class="compare">
            <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">

            <div class="slider">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
            </div>

            <div class="handle"></div>

            <div class="label before">ANTES</div>
            <div class="label after">DESPUÉS</div>

        </div>

        <div class="counter" id="counter">0</div>
        <p>Proyectos completados</p>

    </section>

    <script>

        /* SCROLL ANIMATION */
        const faders = document.querySelectorAll(".fade");

        window.addEventListener("scroll", () => {
            faders.forEach(el => {
                const top = el.getBoundingClientRect().top;
                if (top < window.innerHeight - 100) {
                    el.classList.add("active");
                }
            });
        });

        /* COUNTER */
        let count = 0;
        let counter = document.getElementById("counter");

        let interval = setInterval(() => {
            count++;
            counter.innerText = count;
            if (count == 120) {
                clearInterval(interval);
            }
        }, 20);

        /* BEFORE AFTER DRAG */
        const handle = document.querySelector(".handle");
        const slider = document.querySelector(".slider");

        handle.addEventListener("mousedown", () => {
            window.onmousemove = (e) => {
                let x = e.clientX / window.innerWidth * 100;
                slider.style.width = x + "%";
                handle.style.left = x + "%";
            };
        });

        window.onmouseup = () => {
            window.onmousemove = null;
        };

    </script>

</body>

</html>
