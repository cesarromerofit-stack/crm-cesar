<!DOCTYPE html>
<html>

<head>
    <title>CRM Inmobiliario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2>🏡 CRM Inmobiliario</h2>

        <form action="/guardar" method="POST">

            <input class="form-control mb-2" name="nombre" placeholder="Nombre">
            <input class="form-control mb-2" name="proyecto" placeholder="Proyecto">
            <input class="form-control mb-2" name="presupuesto" placeholder="Presupuesto">
            <input class="form-control mb-2" name="zona" placeholder="Zona">

            <!-- 🔥 NUEVO -->
            <input class="form-control mb-2" name="telefono" placeholder="Teléfono">

            <button class="btn btn-primary w-100">Guardar Cliente</button>

        </form>

        <br>
        <a href="/clientes" class="btn btn-secondary">Ver Clientes</a>

    </div>

</body>

</html>
