<!DOCTYPE html>
<html>

<head>
    <title>Editar Cliente</title>
</head>

<body style="font-family: Arial; padding: 40px;">

    <h2>Editar Cliente</h2>

    <form method="POST">

        <input type="text" name="nombre" value="{{ cliente[0] }}"><br><br>
        <input type="text" name="proyecto" value="{{ cliente[1] }}"><br><br>
        <input type="number" name="presupuesto" value="{{ cliente[2] }}"><br><br>
        <input type="text" name="zona" value="{{ cliente[3] }}"><br><br>
        <input type="text" name="telefono" value="{{ cliente[4] }}"><br><br>

        <button type="submit">Guardar</button>

    </form>

    <br>
    <a href="/clientes">← Volver</a>

</body>

</html>
